services:
  e14_oracle:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: e14_oracle
    command: ["python3", "oracle_layer.py"]
    restart: unless-stopped
    env_file: ./config/.env.lock
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  e14_driftwatcher:
